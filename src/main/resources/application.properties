spring.application.name=book-recommendation
server.port=8080

# openrouter chatbot
spring.ai.openai.base-url=https://openrouter.ai/api
spring.ai.openai.api-key=${OPENROUTER_API_KEY:demo-key-not-set}
spring.ai.openai.chat.options.model=${OPENROUTER_MODEL:meta-llama/llama-3.3-70b-instruct:free}
spring.ai.openai.chat.options.temperature=0.3
spring.ai.model.chat=openai
spring.ai.model.embedding=transformers

# upload size limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# rdf data file
app.rdf.data-file=data/books.rdf
app.rdf.seed=classpath:rdf/books.rdf

logging.level.org.apache.jena=WARN
spring.thymeleaf.cache=false
